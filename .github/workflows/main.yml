name: Scraper Kalunga 2026
on:
  schedule:
    - cron: '0 10,16,23 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Project Dependencies
        id: install
        run: npm install

      # Se o npm install falhar, avisa no Discord antes de morrer
      - name: Alert Setup Failure
        if: failure() && steps.install.outcome == 'failure'
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"❌ **ERRO NO SETUP**: O comando 'npm install' falhou no GitHub Actions. Verifique as versões no package.json.\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: Run Scraper
        env:
          PRODUCT_URL: ${{ secrets.PRODUCT_URL }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          CI: true
        run: npm start

      - name: Commit and Push
        if: always()
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add precos.json
          git commit -m "database: update prices [skip ci]" || echo "No changes"
          git push