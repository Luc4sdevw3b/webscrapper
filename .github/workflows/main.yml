name: Scraper Kalunga 2026 (Docker Optimized)
on:
  schedule:
    - cron: '0 10,16,23 * * *' # 7h, 13h, 20h BRT
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    # Aqui está o segredo: usamos a imagem oficial que já vem com Node e Browsers
    container:
      image: mcr.microsoft.com/playwright:v1.50.0-jammy 
    
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Como a imagem já tem Node, só precisamos instalar as deps do seu projeto
      - name: Install Project Dependencies
        run: npm install

      - name: Run Scraper
        env:
          PRODUCT_URL: ${{ secrets.PRODUCT_URL }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          # No Docker, o Playwright roda melhor com essa flag de env
          CI: true
        run: npm start

      - name: Commit and Push
        if: always()
        run: |
          # No Docker, às vezes o Git reclama de permissão de diretório
          git config --global --add safe.directory /__w/kalunga-price-tracker/kalunga-price-tracker
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add precos.json
          git commit -m "database: update prices [skip ci]" || echo "No changes"
          git push