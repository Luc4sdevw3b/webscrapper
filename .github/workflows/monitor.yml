name: Monitor de Preços Kalunga

on:
  schedule:
    # 07:00, 14:00 e 18:00 Brasília (UTC-3) -> 10:00, 17:00, 21:00 UTC
    - cron: '0 10,17,21 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout código
        uses: actions/checkout@v4 # Versão mais atualizada

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Usando a versão estável mais atualizada

      - name: Instalar dependências
        run: npm install

      - name: Rodar Scraper
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node index.js

      - name: Salvar histórico no GitHub
        run: |
          git config --global user.name 'PrecoBot'
          git config --global user.email 'bot@noreply.github.com'
          git add precos.json
          git commit -m "Atualização automática de preços [skip ci]" || echo "Sem mudanças"
          git push