name: Monitor de Preços Kalunga

on:
  schedule:
    - cron: '0 10,17,21 * * *'
  workflow_dispatch:

env:
  # Mantém os scripts internos do GitHub rodando no motor JS mais novo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm' # Isso acelera o processo nas próximas vezes

      - name: Instalar dependências
        run: npm install

      - name: Rodar Scraper
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node index.js

      - name: Salvar histórico no GitHub
        run: |
          git config --global user.name 'PrecoBot'
          git config --global user.email 'bot@noreply.github.com'
          git add precos.json
          git commit -m "Atualização de preços [skip ci]" || echo "Sem mudanças"
          git push