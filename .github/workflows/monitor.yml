name: Monitor de Preços Kalunga

on:
  schedule:
    # 07:00, 14:00 e 18:00 Brasília (UTC-3)
    - cron: '0 10,17,21 * * *'
  workflow_dispatch:

env:
  # Isso força o GitHub a usar o Node 24 e silencia avisos de versões antigas
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Garantindo o uso da v24
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Rodar Scraper
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node index.js

      - name: Salvar histórico no GitHub
        run: |
          git config --global user.name 'PrecoBot'
          git config --global user.email 'bot@noreply.github.com'
          git add precos.json
          git commit -m "Atualização de preços [skip ci]" || echo "Sem mudanças"
          git push